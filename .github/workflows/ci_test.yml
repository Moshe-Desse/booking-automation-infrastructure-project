name: Automation Playwright Tests

on:
  push:
    branches: [ main ]

jobs:
  run-playwright:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Install Playwright Browsers
        run: playwright install --with-deps

      - name: Run Pytest
        # הפקודה הזו מגדירה שהתיקייה הנוכחית היא הבסיס לכל ה-Imports
        env:
          PYTHONPATH: .
        run: pytest tests/ -v