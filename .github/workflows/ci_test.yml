name: Hotel Booking Automation Tests

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  
  # תזמון אוטומטי: כל יום בחצות (שעון UTC)
  schedule:
    - cron: '0 0 * * *'
  
  # מוסיף כפתור "Run workflow" בגיטהאב להרצה ידנית בכל רגע
  workflow_dispatch: 

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        # הגדרת שתי מערכות ההרצה שירוצו במקביל
        browser_name: ['CHROME', 'FIREFOX']

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: |
          pip install -r requirements.txt
          playwright install --with-deps

      - name: Update Config for ${{ matrix.browser_name }}
        # נכנס לתיקיית config ומחליף את סוג הדפדפן בקובץ ה-JSON
        run: |
          sed -i 's/"BROWSER_TYPE":"CHROME"/"BROWSER_TYPE":"${{ matrix.browser_name }}"/g' config/config.json
          echo "Current Configuration for this run:"
          cat config/config.json

      - name: Run Pytest
        # הרצה עם מסך וירטואלי. ה- "|| true" מבטיח שהתהליך ימשיך להעלאת הדוחות גם אם טסט נכשל
        run: xvfb-run pytest tests/ -v || true

      # --- שמירת תוצאות הבדיקה (Artifacts) ---
      
      - name: Upload Allure Results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: allure-results-${{ matrix.browser_name }}
          path: allure-results/
          retention-days: 7

      - name: Upload Test Traces
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: traces-${{ matrix.browser_name }}
          path: traces/
          retention-days