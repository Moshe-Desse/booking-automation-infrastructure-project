name: Automation Playwright Tests

on:
  push:
    branches: [ main ]

jobs:
  run-playwright:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Install Playwright Browsers
        run: playwright install --with-deps

      - name: List Files (Debug)
        # השלב הזה יעזור לנו לראות איפה הקבצים שלך נמצאים בתוך המכונה
        run: ls -R

      - name: Run Pytest
        # הוספנו -v כדי לראות פירוט של מה קורה
        run: pytest -v